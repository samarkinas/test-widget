<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>CarPrice — демонстрационная страница с BPMSoft-чатом</title>

  <link rel="stylesheet" href="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/widget.css">

  <style>

    :root {
      --cp-green: #009f3f;
      --cp-green-dark: #008c38;
      --cp-green-soft: #eaf7ef;
      --cp-orange: #ff6b23;
      --cp-ink: #202522;
      --cp-muted: #69716c;
      --cp-line: #e5eae7;
      --cp-bg: #f4f6f5;
      --cp-white: #ffffff;
      --cp-chat-width: 384px;
      --cp-chat-height: 632px;
      --cp-chat-header-height: 136px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--cp-ink);
      background: var(--cp-bg);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select {
      font: inherit;
    }

    button, a {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-container {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    /* ===== ШАПКА САЙТА ===== */
    .site-header {
      position: relative;
      z-index: 20;
      background: var(--cp-white);
      border-bottom: 1px solid var(--cp-line);
    }

    .site-header__inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .brand__mark {
      position: relative;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: var(--cp-white);
      background: var(--cp-green);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .brand__mark::after {
      content: "";
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: 6px;
      height: 6px;
      border: 2px solid var(--cp-white);
      border-top: 0;
      border-left: 0;
      transform: rotate(-45deg);
    }

    .brand__name span {
      color: var(--cp-green);
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-left: 14px;
      color: #3b413d;
      font-size: 14px;
      font-weight: 600;
    }

    .site-nav a {
      transition: color .18s ease;
    }

    .site-nav a:hover {
      color: var(--cp-green);
    }

    .site-header__actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .site-phone {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
    }

    .button {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 22px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button--green {
      color: var(--cp-white);
      background: var(--cp-green);
      box-shadow: 0 8px 22px rgba(0, 159, 63, .18);
    }

    .button--green:hover {
      background: var(--cp-green-dark);
    }

    .button--orange {
      color: var(--cp-white);
      background: var(--cp-orange);
      box-shadow: 0 10px 24px rgba(255, 107, 35, .24);
    }

    .button--orange:hover {
      background: #f45d17;
    }

    /* ===== ПЕРВЫЙ ЭКРАН ===== */
    .hero {
      position: relative;
      overflow: hidden;
      color: var(--cp-white);
      background: var(--cp-green);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, .07);
      pointer-events: none;
    }

    .hero::before {
      width: 440px;
      height: 440px;
      right: -130px;
      top: -250px;
    }

    .hero::after {
      width: 300px;
      height: 300px;
      left: 39%;
      bottom: -220px;
    }

    .hero__inner {
      position: relative;
      z-index: 2;
      min-height: 590px;
      display: grid;
      grid-template-columns: minmax(0, 640px) minmax(300px, 1fr);
      align-items: end;
      gap: 24px;
      padding-top: 68px;
    }

    .hero__content {
      align-self: center;
      padding: 28px 0 72px;
    }

    .hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, .86);
      font-size: 14px;
      font-weight: 700;
    }

    .hero__eyebrow::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #8be8aa;
      box-shadow: 0 0 0 6px rgba(139, 232, 170, .15);
    }

    .hero h1 {
      max-width: 710px;
      margin: 0;
      font-size: clamp(44px, 5.2vw, 72px);
      line-height: .98;
      letter-spacing: -3.5px;
      font-weight: 800;
    }

    .hero__lead {
      max-width: 560px;
      margin: 24px 0 30px;
      color: rgba(255, 255, 255, .9);
      font-size: 20px;
      line-height: 1.45;
    }

    .valuation-card {
      width: min(610px, 100%);
      padding: 22px;
      color: var(--cp-ink);
      background: var(--cp-white);
      border-radius: 20px;
      box-shadow: 0 24px 55px rgba(0, 68, 27, .2);
    }

    .vehicle-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .vehicle-tabs::-webkit-scrollbar {
      display: none;
    }

    .vehicle-tab {
      flex: 0 0 auto;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--cp-line);
      border-radius: 10px;
      color: #5e6761;
      background: #f7f8f7;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .vehicle-tab.is-active {
      color: var(--cp-green-dark);
      background: var(--cp-green-soft);
      border-color: #bfe5cc;
    }

    .valuation-grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr auto;
      gap: 10px;
    }

    .field {
      min-height: 56px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 8px 14px;
      border: 1px solid #dce2de;
      border-radius: 12px;
      background: var(--cp-white);
    }

    .field label {
      color: #89908b;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 0;
      border: 0;
      outline: 0;
      color: var(--cp-ink);
      background: transparent;
      font-size: 15px;
      font-weight: 700;
    }

    .valuation-grid .button {
      min-width: 150px;
      min-height: 56px;
      border-radius: 12px;
    }

    .valuation-note {
      margin: 12px 2px 0;
      color: #7b827e;
      font-size: 12px;
      line-height: 1.4;
    }

    .hero__visual {
      position: relative;
      align-self: stretch;
      min-height: 540px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .hero__visual::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 30px;
      width: 430px;
      height: 430px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .hero__man {
      position: relative;
      z-index: 2;
      width: min(460px, 100%);
      max-height: 560px;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 24px 26px rgba(0, 54, 22, .25));
    }

    .hero-badge {
      position: absolute;
      z-index: 3;
      right: 4px;
      bottom: 58px;
      width: 176px;
      padding: 15px 16px;
      color: var(--cp-ink);
      background: rgba(255, 255, 255, .96);
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(0, 56, 22, .2);
    }

    .hero-badge strong {
      display: block;
      margin-bottom: 3px;
      color: var(--cp-green-dark);
      font-size: 24px;
    }

    .hero-badge span {
      color: #5f6762;
      font-size: 12px;
      line-height: 1.35;
    }

    /* ===== СОДЕРЖИМОЕ СТРАНИЦЫ ===== */
    .section {
      padding: 92px 0;
    }

    .section--white {
      background: var(--cp-white);
    }

    .section-heading {
      max-width: 760px;
      margin: 0 auto 48px;
      text-align: center;
    }

    .section-heading__label {
      margin: 0 0 12px;
      color: var(--cp-green);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .section-heading h2 {
      margin: 0;
      font-size: clamp(34px, 4vw, 52px);
      line-height: 1.06;
      letter-spacing: -2px;
    }

    .section-heading p:last-child {
      margin: 18px auto 0;
      color: var(--cp-muted);
      font-size: 17px;
      line-height: 1.6;
    }

    .auction-card {
      min-height: 360px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      align-items: center;
      gap: 36px;
      padding: 48px;
      border-radius: 28px;
      background: #e9f7ee;
      overflow: hidden;
    }

    .auction-card h3 {
      margin: 0 0 16px;
      font-size: 38px;
      line-height: 1.08;
      letter-spacing: -1.5px;
    }

    .auction-card p {
      margin: 0 0 26px;
      color: var(--cp-muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .auction-points {
      display: grid;
      gap: 13px;
    }

    .auction-point {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }

    .auction-point::before {
      content: "✓";
      width: 25px;
      height: 25px;
      display: grid;
      place-items: center;
      flex: 0 0 25px;
      color: var(--cp-white);
      background: var(--cp-green);
      border-radius: 50%;
      font-size: 13px;
    }

    .auction-visual {
      position: relative;
      min-height: 260px;
      display: grid;
      place-items: center;
    }

    .auction-visual::before {
      content: "";
      position: absolute;
      width: 310px;
      height: 210px;
      border-radius: 50%;
      background: rgba(0, 159, 63, .12);
      filter: blur(2px);
    }

    .auction-visual img {
      position: relative;
      z-index: 2;
      width: min(430px, 100%);
      filter: drop-shadow(0 20px 22px rgba(34, 62, 45, .18));
    }

    .benefits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .benefit {
      min-height: 218px;
      padding: 28px;
      border: 1px solid var(--cp-line);
      border-radius: 20px;
      background: var(--cp-white);
      box-shadow: 0 14px 34px rgba(28, 50, 37, .05);
    }

    .benefit__icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      margin-bottom: 26px;
      border-radius: 15px;
      color: var(--cp-green);
      background: var(--cp-green-soft);
      font-size: 24px;
    }

    .benefit h3 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .benefit p {
      margin: 0;
      color: var(--cp-muted);
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .stat {
      padding: 25px 18px;
      border-radius: 18px;
      color: var(--cp-white);
      background: var(--cp-green);
      text-align: center;
    }

    .stat strong {
      display: block;
      margin-bottom: 7px;
      font-size: 34px;
      line-height: 1;
    }

    .stat span {
      color: rgba(255, 255, 255, .82);
      font-size: 13px;
      line-height: 1.35;
    }

    .site-footer {
      padding: 34px 0;
      color: #cad0cc;
      background: #1c2420;
    }

    .site-footer__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .site-footer .brand {
      color: var(--cp-white);
      font-size: 21px;
    }

    .site-footer small {
      font-size: 12px;
    }

    /* =================================================================
       ВИДЖЕТ. ВАЖНО: мы не перестраиваем DOM BPMSoft и не переносим его
       элементы. Меняются только безопасные размеры/цвета. Визуальная
       шапка и пустое состояние — отдельные накладки поверх виджета.
       ================================================================= */

    .carprice-chat-launcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 2147483600;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      transition: opacity .18s ease, transform .18s ease;
    }

    .carprice-chat-launcher:hover {
      transform: translateY(-2px);
    }

    .carprice-chat-launcher.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
    }

    .carprice-chat-launcher__label {
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 21px;
      border-radius: 16px;
      color: var(--cp-white);
      background: var(--cp-green);
      box-shadow: 0 7px 15px rgba(0, 79, 31, .28);
      white-space: nowrap;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }

    .carprice-chat-launcher__circle {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      flex: 0 0 64px;
      border-radius: 50%;
      color: var(--cp-white);
      background: var(--cp-green);
      box-shadow: 0 7px 15px rgba(0, 79, 31, .28);
    }

    .carprice-chat-launcher__circle svg {
      width: 38px;
      height: 38px;
      display: block;
    }

    /* Скрываем только родную плавающую кнопку; она остаётся кликабельной из JS. */
    #bpmsoftoccchat-widget-startbutton {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #bpmsoftoccchat-container {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    /* Только внешний размер окна — без absolute/fixed для внутренних блоков. */
    #bpmsoftoccchat-container .bpmsoftoccchat-messenger {
      width: var(--cp-chat-width) !important;
      height: var(--cp-chat-height) !important;
      max-width: calc(100vw - 24px) !important;
      max-height: calc(100vh - 24px) !important;
      right: 12px !important;
      bottom: 12px !important;
      border: 0 !important;
      border-radius: 18px !important;
      overflow: visible !important;
      background: var(--cp-white) !important;
      box-shadow: 0 10px 34px rgba(18, 31, 24, .25) !important;
    }

    /* Родная шапка остаётся в потоке и резервирует место для нашей накладки. */
    #bpmsoftoccchat-container .bpmsoftoccchat-conversation-body-profile {
      flex: 0 0 var(--cp-chat-header-height) !important;
      min-height: var(--cp-chat-header-height) !important;
      height: var(--cp-chat-header-height) !important;
      max-height: var(--cp-chat-header-height) !important;
      /*
       * Родная шапка BPMSoft нужна только как место под кастомную шапку.
       * Делаем её прозрачной, чтобы при overflow: visible не появлялся
       * отдельный зелёный прямоугольник над чатом.
       */
      background: transparent !important;
      border-radius: 18px 18px 0 0 !important;
      overflow: hidden !important;
    }

    /* Скрываем содержимое родной шапки, но не меняем её геометрию. */
    #bpmsoftoccchat-container .bpmsoftoccchat-conversation-body-profile > * {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* Панель выбора каналов отключена конфигурацией. Эти селекторы — страховка. */
    #bpmsoftoccchat-container .bpmsoftoccchat-channel-panel,
    #bpmsoftoccchat-container .bpmsoftoccchat-channels-panel,
    #bpmsoftoccchat-container .bpmsoftoccchat-channel-choose,
    #bpmsoftoccchat-container [data-testid="channel-panel"] {
      display: none !important;
    }

    #bpmsoftoccchat-container .bpmsoftoccchat-bot-button,
    #bpmsoftoccchat-container button[type="submit"] {
      background-color: var(--cp-green) !important;
    }

    #bpmsoftoccchat-container .bpmsoftoccchat-bot-button:hover,
    #bpmsoftoccchat-container button[type="submit"]:hover {
      background-color: var(--cp-green-dark) !important;
    }

    #bpmsoftoccchat-container input,
    #bpmsoftoccchat-container textarea,
    #bpmsoftoccchat-container button {
      font-family: Arial, Helvetica, sans-serif !important;
    }

    .carprice-chat-header {
      position: fixed;
      z-index: 2147483645;
      display: none;
      height: var(--cp-chat-header-height);
      padding: 16px 56px 14px;
      color: var(--cp-white);
      background: var(--cp-green);
      border-radius: 18px 18px 0 0;
      text-align: center;
      pointer-events: none;
      overflow: hidden;
    }

    .carprice-chat-header.is-visible {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .carprice-chat-header__avatars {
      height: 47px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .carprice-chat-header__avatar {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      margin-left: -9px;
      border: 2px solid var(--cp-white);
      border-radius: 50%;
      background-color: #d9eadf;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    .carprice-chat-header__avatar:first-child {
      margin-left: 0;
      background-image: url("https://files.carrotquest.app/avatars/1780662050800-l7ukitag.png");
    }

    .carprice-chat-header__avatar:nth-child(2) {
      background-image: url("https://files.carrotquest.app/avatars/1743600487736-r1oza86w.png");
    }

    .carprice-chat-header__avatar:nth-child(3) {
      background-image: url("https://files.carrotquest.app/avatars/1743601763545-ud7uyizw.png");
    }

    .carprice-chat-header__title {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.12;
    }

    .carprice-chat-header__subtitle {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .78);
      font-size: 14px;
      line-height: 1.2;
    }

    .carprice-chat-header__close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 50%;
      color: var(--cp-white);
      background: rgba(255, 255, 255, .2);
      cursor: pointer;
      pointer-events: auto;
      transition: background .16s ease;
    }

    .carprice-chat-header__close:hover {
      background: rgba(255, 255, 255, .29);
    }

    .carprice-chat-header__close svg {
      width: 21px;
      height: 21px;
    }

    .carprice-chat-empty {
      position: fixed;
      z-index: 2147483644;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px 22px;
      color: #515653;
      background: #f1f2f1;
      border-radius: 16px;
      text-align: center;
      pointer-events: none;
      overflow: hidden;
    }

    .carprice-chat-empty.is-visible {
      display: flex;
    }

    .carprice-chat-empty__content {
      max-width: 285px;
    }

    .carprice-chat-empty__icon {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      color: #868b88;
    }

    .carprice-chat-empty__title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .carprice-chat-empty__text {
      margin: 8px 0 0;
      color: #747a76;
      font-size: 14px;
      line-height: 1.4;
    }

    @media (max-width: 1040px) {
      .site-nav {
        display: none;
      }

      .hero__inner {
        grid-template-columns: minmax(0, 1fr) 360px;
      }

      .hero h1 {
        font-size: 56px;
      }

      .hero-badge {
        right: -5px;
      }
    }

    @media (max-width: 820px) {
      .site-header__inner {
        min-height: 64px;
      }

      .site-phone {
        display: none;
      }

      .hero__inner {
        min-height: 0;
        grid-template-columns: 1fr;
        padding-top: 32px;
      }

      .hero__content {
        padding-bottom: 12px;
      }

      .hero h1 {

    /* Страница заказчика изолирована от CSS виджета. */
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #client-page {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .carprice-chat-launcher,
    .carprice-chat-header,
    .carprice-chat-empty,
    #bpmsoftocc-chat,
    #bpmsoftoccchat-container {
      z-index: 2147483000;
    }

  
    /* Сворачивание без закрытия соединения и без перезапуска чат-бота. */
    #bpmsoftoccchat-container.carprice-chat-is-collapsed
    .bpmsoftoccchat-messenger {
      display: none !important;
    }

    /*
     * Панель эмодзи может выходить за границы окна, но теперь не обрезается.
     * z-index применяется только к элементам, чьи классы прямо связаны
     * с emoji/smile/picker.
     */
    #bpmsoftoccchat-container [class*="emoji" i],
    #bpmsoftoccchat-container [class*="smile" i],
    #bpmsoftoccchat-container [class*="picker" i] {
      z-index: 2147483647 !important;
    }

    #bpmsoftoccchat-container
    .bpmsoftoccchat-conversation-body-profile::before,
    #bpmsoftoccchat-container
    .bpmsoftoccchat-conversation-body-profile::after {
      background: transparent !important;
      box-shadow: none !important;
    }

  
    /* Сдвиг рабочей области чата относительно кастомной шапки. */
    #bpmsoftoccchat-container .bpmsoftoccchat-conversation-body {
      transform: translateY(-205px) !important;
    }

    /* Входящие сообщения оператора: серый фон, тёмный текст. */
    #bpmsoftoccchat-container
    .bpmsoftoccchat-comment-container-admin
    .bpmsoftoccchat-comment {
      background-color: #F6F6F6 !important;
      color: #202522 !important;
    }

    #bpmsoftoccchat-container
    .bpmsoftoccchat-comment-container-admin
    .bpmsoftoccchat-comment p {
      color: #202522 !important;
    }

    #bpmsoftoccchat-container
    .bpmsoftoccchat-comment-container-admin
    .bpmsoftoccchat-comment::after {
      border-right: 15px solid #F6F6F6 !important;
    }

    /* Исходящие сообщения пользователя: зелёный фон, белый текст. */
    #bpmsoftoccchat-container
    .bpmsoftoccchat-comment-container-user
    .bpmsoftoccchat-comment {
      background-color: #02a250 !important;
      color: #ffffff !important;
    }

    #bpmsoftoccchat-container
    .bpmsoftoccchat-comment-container-user
    .bpmsoftoccchat-comment p {
      color: #ffffff !important;
    }

    #bpmsoftoccchat-container
    .bpmsoftoccchat-comment-container-user
    .bpmsoftoccchat-comment::after {
      border-left: 15px solid #02a250 !important;
    }

  
    /*
     * Поле ввода шире штатного, но не растянуто до правого края:
     * справа оставлена свободная зона, чтобы поле заканчивалось
     * примерно под началом исходящих сообщений.
     */
    #bpmsoftoccchat-container .bpmsoftoccchat-composer {
      width: 100% !important;
      max-width: none !important;
      box-sizing: border-box !important;
    }

    #bpmsoftoccchat-container
    .bpmsoftoccchat-composer div:has(> textarea) {
      left: 0 !important;
      right: 0 !important;
      width: 100% !important;
      max-width: none !important;
      box-sizing: border-box !important;
    }

    #bpmsoftoccchat-container .bpmsoftoccchat-composer textarea {
      bottom: 2px !important;
      left: 10px !important;
      right: 78px !important;
      width: auto !important;
      max-width: none !important;
      margin: 0 !important;
      box-sizing: border-box !important;
    }

    /* Больше воздуха между полем и кнопками файла/смайликов. */
    #bpmsoftoccchat-container .bpmsoftoccchat-composer-buttons {
      margin-left: 10px !important;
      margin-top: 12px !important;
    }

    /* Кнопка отправки справа и на одной линии с остальными кнопками. */
    #bpmsoftoccchat-container .bpmsoftoccchat-composer-send-button {
      margin-top: 12px !important;
      left: auto !important;
      right: 10px !important;
    }

  </style>
</head>
<body>
  <iframe
    id="client-page"
    src="./carprice-page.html"
    title="Демонстрационная страница CarPrice">
  </iframe>

  <button class="carprice-chat-launcher" id="carprice-chat-launcher" type="button" aria-label="Открыть чат">
    <span class="carprice-chat-launcher__label">Я тут, если что</span>
    <span class="carprice-chat-launcher__circle" aria-hidden="true">
      <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 8h22a3 3 0 0 1 3 3v15a3 3 0 0 1-3 3H21l-9 6v-6h-2a3 3 0 0 1-3-3V11a3 3 0 0 1 3-3Z" fill="currentColor"/>
        <circle cx="16" cy="18.5" r="1.75" fill="#009f3f"/>
        <circle cx="21" cy="18.5" r="1.75" fill="#009f3f"/>
        <circle cx="26" cy="18.5" r="1.75" fill="#009f3f"/>
      </svg>
    </span>
  </button>

  <!-- Отдельная визуальная шапка. Она не внедряется во внутренний DOM BPMSoft. -->
  <div class="carprice-chat-header" id="carprice-chat-header" aria-hidden="true">
    <div class="carprice-chat-header__avatars">
      <span class="carprice-chat-header__avatar"></span>
      <span class="carprice-chat-header__avatar"></span>
      <span class="carprice-chat-header__avatar"></span>
    </div>
    <p class="carprice-chat-header__title">CarPrice</p>
    <p class="carprice-chat-header__subtitle">Мы тут и готовы помочь</p>
    <button class="carprice-chat-header__close" id="carprice-chat-close" type="button" aria-label="Свернуть чат">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="m6.5 9 5.5 5.5L17.5 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Пустое состояние истории, расположенное отдельно и не влияющее на сетку чата. -->
  <div class="carprice-chat-empty" id="carprice-chat-empty" aria-hidden="true">
    <div class="carprice-chat-empty__content">
      <svg class="carprice-chat-empty__icon" viewBox="0 0 68 68" fill="none" aria-hidden="true">
        <path d="M13 11h31a4 4 0 0 1 4 4v22a4 4 0 0 1-4 4H28l-10 7v-7h-5a4 4 0 0 1-4-4V15a4 4 0 0 1 4-4Z" stroke="currentColor" stroke-width="2.7" stroke-linejoin="round"/>
        <path d="M18 20h21M18 27h16M18 34h11" stroke="currentColor" stroke-width="2.7" stroke-linecap="round"/>
        <path d="M32 32h21a4 4 0 0 1 4 4v16a4 4 0 0 1-4 4h-4v7l-9-7h-8a4 4 0 0 1-4-4V36a4 4 0 0 1 4-4Z" fill="#f1f2f1" stroke="currentColor" stroke-width="2.7" stroke-linejoin="round"/>
        <circle cx="38" cy="43" r="1.55" fill="currentColor"/>
        <circle cx="47" cy="43" r="1.55" fill="currentColor"/>
        <path d="M38 49c3 3 6 3 9 0" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
      <p class="carprice-chat-empty__title">Мы с вами ещё не общались</p>
      <p class="carprice-chat-empty__text">Здесь будет история ваших диалогов</p>
    </div>
  </div>

  <div id="bpmsoftocc-chat"></div>

  <script>
    window.bpmsoftoccconfig = {
      channelId: '0cf34a2b-70e4-4a6e-8b5e-0eb0dd8e9247',
      connectorUrl: 'https://bpmsoft-oc-connector1.cloudbpm.ru',
      title: 'CarPrice',
      subtitle: 'Мы тут и готовы помочь',
      themeColor: '#009f3f',
      widgetButtonColor: '#009f3f',
      widgetButtonColorLine: '#ffffff',
      chatMessagePlaceholder: 'Введите сообщение...',
      noMessagesHistoryCaption: 'Мы с вами ещё не общались',
      closeChatCaption: 'Свернуть',
      enableFileUpload: true,
      showChannelPanel: false,
      channelsInPanel: null
    };
  </script>

  <script src="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/widget.js" async></script>
  <script src="https://bpmsoft-oc-widget1.cloudbpm.ru/3.2/chunk-vendors.js" async></script>

  <script>

    (() => {
      const launcher = document.getElementById('carprice-chat-launcher');
      const visualHeader = document.getElementById('carprice-chat-header');
      const emptyState = document.getElementById('carprice-chat-empty');
      const closeButton = document.getElementById('carprice-chat-close');
      const HEADER_HEIGHT = 136;
      const EMPTY_MARGIN = 16;
      const COMPOSER_RESERVE = 82;
      let openRequestTimer = null;

      const getStartButton = () => document.getElementById('bpmsoftoccchat-widget-startbutton');
      const getRoot = () => document.getElementById('bpmsoftoccchat-container');
      const getMessenger = () => getRoot()?.querySelector('.bpmsoftoccchat-messenger') || null;

      const isVisible = (element) => {
        if (!element) return false;
        const style = window.getComputedStyle(element);
        const rect = element.getBoundingClientRect();
        return style.display !== 'none' &&
          style.visibility !== 'hidden' &&
          Number(style.opacity || 1) > 0 &&
          rect.width > 180 &&
          rect.height > 220;
      };

      const hasMessages = (root) => {
        if (!root) return false;
        return Boolean(root.querySelector(
          '.bpmsoftoccchat-comment, ' +
          '.bpmsoftoccchat-comment-container-admin, ' +
          '.bpmsoftoccchat-comment-container-client, ' +
          '[class*="message-item"], ' +
          '[data-testid*="message"]'
        ));
      };

      const positionOverlays = () => {
        const messenger = getMessenger();
        const open = isVisible(messenger);

        launcher.classList.toggle('is-hidden', open);
        visualHeader.classList.toggle('is-visible', open);

        if (!open) {
          emptyState.classList.remove('is-visible');
          return;
        }

        const rect = messenger.getBoundingClientRect();
        visualHeader.style.left = `${Math.round(rect.left)}px`;
        visualHeader.style.top = `${Math.round(rect.top)}px`;
        visualHeader.style.width = `${Math.round(rect.width)}px`;

        const emptyTop = rect.top + HEADER_HEIGHT + EMPTY_MARGIN;
        const emptyHeight = Math.max(180, rect.height - HEADER_HEIGHT - (EMPTY_MARGIN * 2) - COMPOSER_RESERVE);

        emptyState.style.left = `${Math.round(rect.left + EMPTY_MARGIN)}px`;
        emptyState.style.top = `${Math.round(emptyTop)}px`;
        emptyState.style.width = `${Math.round(rect.width - (EMPTY_MARGIN * 2))}px`;
        emptyState.style.height = `${Math.round(emptyHeight)}px`;
        emptyState.classList.toggle('is-visible', !hasMessages(getRoot()));
      };

      const findNativeClose = () => {
        const messenger = getMessenger();
        if (!messenger) return null;

        const controls = messenger.querySelectorAll('button, [role="button"], [title], [aria-label]');
        return [...controls].find((control) => {
          const description = [
            control.getAttribute('title'),
            control.getAttribute('aria-label'),
            typeof control.className === 'string' ? control.className : '',
            control.textContent
          ].filter(Boolean).join(' ').toLowerCase();

          return /сверн|закры|close|minimi|collapse|chevron-down/.test(description);
        }) || null;
      };

      const openChat = () => {
        const root = getRoot();

        /*
         * После локального сворачивания просто возвращаем тот же DOM чата.
         * Сессия, история, быстрые ответы, вложения и эмодзи не создаются заново.
         */
        if (root?.classList.contains('carprice-chat-is-collapsed')) {
          root.classList.remove('carprice-chat-is-collapsed');
          window.requestAnimationFrame(positionOverlays);
          return;
        }

        const clickWhenReady = () => {
          const startButton = getStartButton();
          if (!startButton) return false;
          startButton.click();
          window.setTimeout(positionOverlays, 120);
          return true;
        };

        if (clickWhenReady()) return;

        launcher.setAttribute('aria-busy', 'true');
        const started = Date.now();
        window.clearInterval(openRequestTimer);
        openRequestTimer = window.setInterval(() => {
          if (clickWhenReady() || Date.now() - started > 12000) {
            window.clearInterval(openRequestTimer);
            launcher.removeAttribute('aria-busy');
          }
        }, 120);
      };

      const closeChat = () => {
        const root = getRoot();
        const messenger = getMessenger();

        if (!root || !messenger) return;

        /*
         * Не нажимаем неизвестные внутренние элементы BPMSoft.
         * Только скрываем уже работающий messenger и показываем зелёную кнопку.
         */
        root.classList.add('carprice-chat-is-collapsed');
        visualHeader.classList.remove('is-visible');
        emptyState.classList.remove('is-visible');
        launcher.classList.remove('is-hidden');
      };

      launcher.addEventListener('click', openChat);
      closeButton.addEventListener('click', closeChat);
      window.addEventListener('resize', positionOverlays, { passive: true });
      window.addEventListener('scroll', positionOverlays, { passive: true });

      const observer = new MutationObserver(positionOverlays);
      observer.observe(document.body, { childList: true, subtree: true });

      window.setInterval(positionOverlays, 350);
      positionOverlays();
    })();
  
  </script>
</body>
</html>
